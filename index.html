<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CA Final | War Room V16.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        
        :root { 
            --bg: #020617; 
            --card: rgba(15, 23, 42, 0.9); 
            --text: #e2e8f0; 
            --accent: #3b82f6; 
            --border: rgba(51, 65, 85, 0.5);
        }
        
        .light-mode { 
            --bg: #f8fafc; 
            --card: rgba(255, 255, 255, 0.9); 
            --text: #0f172a; 
            --accent: #2563eb; 
            --border: rgba(148, 163, 184, 0.3);
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            transition: background 0.3s, color 0.3s; 
            touch-action: manipulation; 
        }

        .glass { 
            background: var(--card); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--border); 
            color: var(--text);
        }

        .full-overlay { 
            position: fixed; 
            inset: 0; 
            z-index: 100; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            transform: translateY(100%); 
            background: var(--bg);
        }

        .full-overlay.active { transform: translateY(0); }
        .hidden { display: none !important; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .drawer { position: fixed; left: -100%; top: 0; bottom: 0; width: 85%; max-width: 320px; z-index: 200; transition: left 0.3s ease; }
        .drawer.open { left: 0; }

        #battle-stopwatch { color: var(--text); }
        #battle-chapter { color: var(--text); }
        #battle-tag { background: var(--accent); color: white; }

        .mode-btn { transition: all 0.2s; border: 1px solid var(--border); font-size: 10px; color: var(--text); }
        .mode-btn.active { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); color: var(--accent); }
        
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .timer-warning { color: #ef4444 !important; animation: pulse-red 1.5s infinite; }

        ::-webkit-scrollbar { display: none; }
        .ca-logo { fill: var(--accent); }
    </style>
</head>
<body class="pb-10 select-none">

    <nav class="sticky top-0 z-50 glass border-b p-3 px-4">
        <div class="flex items-center justify-between">
            <button onclick="toggleDrawer()" class="p-2 -ml-2"><i data-lucide="menu" class="w-5 h-5"></i></button>
            
            <button onclick="showSubjects()" class="flex flex-col items-center group">
                <svg class="ca-logo w-6 h-6 mb-0.5 transition-transform group-hover:scale-110" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2ZM12 15.5L8.5 17.5L12 7L15.5 17.5L12 15.5Z"/>
                </svg>
                <h1 class="text-[10px] font-black tracking-tighter uppercase italic">WAR ROOM</h1>
                <div id="countdown" class="text-[7px] mono text-yellow-500 font-bold uppercase">LOADING...</div>
            </button>

            <button onclick="toggleTheme()" class="p-2 -mr-2"><i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i></button>
        </div>
        <div class="flex gap-2 mt-3 overflow-x-auto pb-1 no-scrollbar">
            <button id="btn-normal" onclick="setGlobalMode('normal')" class="mode-btn active px-4 py-2 rounded-lg flex-shrink-0 font-bold uppercase tracking-wider">Standard</button>
            <button id="btn-pomo" onclick="setGlobalMode('pomo')" class="mode-btn px-4 py-2 rounded-lg flex-shrink-0 font-bold uppercase tracking-wider">Pomodoro (25m)</button>
            <button id="btn-mock" onclick="openMockSetup()" class="mode-btn px-4 py-2 rounded-lg flex-shrink-0 font-bold uppercase tracking-wider bg-red-900/10 text-red-500 border-red-900/30">Mock Test</button>
        </div>
    </nav>

    <div id="mock-setup" class="full-overlay glass px-6">
        <div class="w-full max-w-md space-y-6">
            <div class="text-center">
                <h2 class="text-2xl font-black italic uppercase">Paper Selection</h2>
                <p class="text-[10px] opacity-60 font-bold tracking-[0.2em] mt-1">15M READING + 3H/4H WRITING</p>
            </div>
            <div class="space-y-2 max-h-[60vh] overflow-y-auto" id="mock-papers-list"></div>
            <button onclick="closeMockSetup()" class="w-full py-4 opacity-50 font-black text-[10px] uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <div id="battle-mode" class="full-overlay px-4">
        <div id="pomo-alert" class="hidden absolute top-20 bg-yellow-500 text-black px-6 py-2 rounded-full font-black text-xs animate-bounce shadow-2xl">TIME UP!</div>
        <div class="text-center w-full space-y-6">
            <div id="battle-tag" class="inline-block px-3 py-1 rounded-full text-[9px] font-black tracking-widest uppercase"></div>
            <h2 id="battle-chapter" class="text-2xl font-black italic px-4 leading-tight"></h2>
            
            <div class="py-6">
                <div id="battle-stopwatch" class="text-6xl sm:text-8xl mono font-black tracking-tighter">00:00:00</div>
                <div id="pomo-subtext" class="text-blue-500 text-[10px] mt-4 font-bold uppercase tracking-widest"></div>
            </div>

            <div class="flex justify-center gap-6 pt-4">
                <button id="btn-pause" onclick="togglePause()" class="w-14 h-14 rounded-full border border-yellow-500/50 flex items-center justify-center text-yellow-500"><i id="pause-icon" data-lucide="pause" class="w-6 h-6"></i></button>
                <button onclick="stopBattle()" class="w-14 h-14 rounded-full border border-red-500/50 flex items-center justify-center text-red-500"><i data-lucide="square" class="w-6 h-6 fill-current"></i></button>
                <button id="btn-done" onclick="markDoneBattle()" class="w-14 h-14 rounded-full border border-green-500/50 flex items-center justify-center text-green-500"><i data-lucide="check" class="w-6 h-6"></i></button>
            </div>
        </div>
    </div>

    <main class="max-w-4xl mx-auto px-4 mt-6">
        <div id="subject-grid-view" class="grid grid-cols-1 gap-4 pb-24"></div>
        <div id="chapter-list-view" class="hidden pb-24">
            <button onclick="showSubjects()" class="mb-4 text-blue-500 font-bold text-[10px] tracking-widest flex items-center gap-1"><i data-lucide="chevron-left" class="w-4 h-4"></i> BACK TO SUBJECTS</button>
            <h2 id="current-subject-title" class="text-2xl font-black italic mb-6 uppercase tracking-tighter"></h2>
            <div id="chapters-container" class="space-y-3"></div>
        </div>
    </main>

    <div id="library-drawer" class="drawer glass p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6"><h2 class="font-black text-lg italic uppercase">Resources</h2><button onclick="toggleDrawer()"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <div id="link-list" class="space-y-2 mb-6"></div>
        <div class="space-y-2">
            <input id="link-name" type="text" placeholder="Site Name" class="w-full bg-black/10 border border-slate-700 p-3 rounded-lg text-xs outline-none focus:border-blue-500">
            <input id="link-url" type="text" placeholder="URL" class="w-full bg-black/10 border border-slate-700 p-3 rounded-lg text-xs outline-none focus:border-blue-500">
            <button onclick="addCustomLink()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold text-xs uppercase tracking-widest">Add Link</button>
        </div>
    </div>

    <script>
        const examDate = new Date("May 2, 2026 09:00:00").getTime();
        const syllabus = {
            "Financial Reporting": { chapters: ["Ind AS 1, 8, 10, 34, 113", "Ind AS 2, 16, 23, 36, 37, 38, 40, 105, 116", "Ind AS 19, 33, 102", "Ind AS 12, 21", "Ind AS 115 (Revenue)", "Financial Instruments (32, 109, 107)", "Business Combinations (103)", "Consolidated FS", "Ind AS 27, 28, 110, 111, 112", "Analysis of FS", "Carbon Credits & Ethics"] },
            "Adv Financial Mgmt": { chapters: ["Financial Policy", "Risk Mgmt", "Advanced Capital Budgeting", "Security Valuation", "Portfolio Mgmt", "Securitization & Mutual Funds", "Derivatives", "Forex Mgmt", "Interest Rate Risk", "Business Valuation", "Mergers & Acquisitions", "Startup Finance"] },
            "Auditing & Ethics": { chapters: ["Quality Control (SQC 1)", "SA 200 Series", "Audit Planning (300s)", "Audit Evidence (500s)", "Audit Reporting (700s)", "Audit of Banks", "Audit of NBFCs", "Audit of PSUs", "Internal Audit", "Due Diligence", "SDG Assurance", "Professional Ethics"] },
            "Direct Tax Laws": { chapters: ["PGBP", "Capital Gains", "Other Sources & ICDS", "Assessment of Entities", "Assessment of Companies (MAT)", "Trusts", "Tax Planning", "TDS/TCS & Advance Tax", "Assessment Procedures", "Appeals & Penalties", "Transfer Pricing", "NR Taxation", "DTAA", "Black Money Act"] },
            "Indirect Tax Laws": { chapters: ["Supply & Charge", "Place of Supply", "Time & Value of Supply", "Input Tax Credit", "Registration & Invoicing", "Returns & Payment", "Refunds", "Assessment & Audit", "Appeals & Penalties", "Customs: Value & Classification", "Customs: Procedures", "FTP"] },
            "Integrated Biz Solutions": { chapters: ["Case Study 1", "Case Study 2", "Case Study 3", "Case Study 4", "Case Study 5", "Case Study 6", "Case Study 7", "Case Study 8"] }
        };

        let studyData = JSON.parse(localStorage.getItem('caWarRoomDataV16')) || {};
        let currentMode = 'normal'; 
        let timerInterval, sessionSeconds = 0, isPaused = false, activeSub = "", activeChap = "";

        function toggleDrawer() { document.getElementById('library-drawer').classList.toggle('open'); }
        function setGlobalMode(m) {
            currentMode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${m}`).classList.add('active');
        }
        function openMockSetup() { 
            const list = document.getElementById('mock-papers-list');
            list.innerHTML = Object.keys(syllabus).map((sub, i) => `
                <button onclick="startMock('Paper ${i+1}: ${sub}')" class="w-full p-4 rounded-xl border border-slate-700 text-left font-bold text-sm glass">Paper ${i+1}: ${sub}</button>
            `).join('');
            document.getElementById('mock-setup').classList.add('active'); 
        }
        function closeMockSetup() { document.getElementById('mock-setup').classList.remove('active'); }

        function startBattle(sub, chap) {
            activeSub = sub; activeChap = chap;
            const battle = document.getElementById('battle-mode');
            battle.classList.add('active');
            document.getElementById('battle-tag').innerText = currentMode.toUpperCase() + " SESSION";
            document.getElementById('battle-chapter').innerText = chap;
            
            if(currentMode === 'pomo') {
                sessionSeconds = 1500; // 25 Minutes
                runCountdown(1500, () => { 
                    document.getElementById('pomo-alert').classList.remove('hidden');
                    setTimeout(() => { document.getElementById('pomo-alert').classList.add('hidden'); stopBattle(); }, 5000);
                });
            } else {
                sessionSeconds = 0;
                runForwardClock();
            }
        }

        function runForwardClock() {
            clearInterval(timerInterval);
            let startTime = Date.now();
            timerInterval = setInterval(() => {
                if(!isPaused) {
                    sessionSeconds = Math.floor((Date.now() - startTime) / 1000);
                    updateDisplay(sessionSeconds);
                }
            }, 1000);
        }

        function runCountdown(seconds, callback) {
            clearInterval(timerInterval);
            let target = seconds;
            timerInterval = setInterval(() => {
                if(!isPaused) {
                    target--;
                    updateDisplay(target);
                    if(target <= 0) { clearInterval(timerInterval); callback(); }
                }
            }, 1000);
        }

        function startMock(paperName) {
            activeSub = "MOCK EXAM"; activeChap = paperName;
            closeMockSetup();
            document.getElementById('battle-mode').classList.add('active');
            document.getElementById('battle-tag').innerText = "PHASE 1: READING (15:00)";
            document.getElementById('battle-chapter').innerText = paperName;
            runCountdown(900, () => {
                document.getElementById('battle-tag').innerText = "PHASE 2: WRITING TIME";
                let total = paperName.includes("Paper 6") ? 14400 : 10800;
                runCountdown(total, () => { alert("TIME UP!"); stopBattle(); });
            });
        }

        function updateDisplay(sec) {
            let h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
            document.getElementById('battle-stopwatch').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function togglePause() { 
            isPaused = !isPaused; 
            document.getElementById('pause-icon').setAttribute('data-lucide', isPaused ? 'play' : 'pause'); 
            lucide.createIcons();
        }

        function stopBattle() { commit(); exit(); }
        function markDoneBattle() { 
            commit(); 
            if(activeSub !== "MOCK EXAM") {
                const k = `${activeSub}-${activeChap}`;
                if(!studyData[k]) studyData[k] = { r1: true, time: 0 };
                else studyData[k].r1 = true;
            }
            exit(); 
        }
        
        function commit() {
            if(activeSub === "MOCK EXAM") return;
            const k = `${activeSub}-${activeChap}`;
            if(!studyData[k]) studyData[k] = { r1: false, time: 0 };
            // For Pomo, we add the full 25m if they finish
            let addedTime = (currentMode === 'pomo') ? (1500 - sessionSeconds) : sessionSeconds;
            studyData[k].time += (addedTime > 0 ? addedTime : 0);
            save();
        }

        function exit() {
            clearInterval(timerInterval);
            document.getElementById('battle-mode').classList.remove('active');
            setTimeout(() => { renderMenu(); if(activeSub !== "MOCK EXAM") renderChapters(activeSub); }, 500);
        }

        function renderMenu() {
            document.getElementById('subject-grid-view').innerHTML = Object.keys(syllabus).map(sub => {
                const comp = syllabus[sub].chapters.filter(c => studyData[`${sub}-${c}`]?.r1).length;
                const per = Math.round((comp/syllabus[sub].chapters.length)*100);
                return `<div class="p-5 rounded-2xl glass flex justify-between items-center" onclick="showChapters('${sub}')">
                    <div class="space-y-1">
                        <h3 class="font-black text-sm uppercase tracking-tight">${sub}</h3>
                        <div class="text-[9px] font-black text-blue-500 uppercase">${per}% COMPLETE</div>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 opacity-30"></i>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function showChapters(sub) {
            activeSub = sub; 
            document.getElementById('subject-grid-view').classList.add('hidden');
            document.getElementById('chapter-list-view').classList.remove('hidden');
            document.getElementById('current-subject-title').innerText = sub;
            renderChapters(sub);
        }

        function renderChapters(sub) {
            document.getElementById('chapters-container').innerHTML = syllabus[sub].chapters.map(chap => {
                const d = studyData[`${sub}-${chap}`] || { r1: false, time: 0 };
                return `<div class="glass p-4 rounded-xl flex items-center gap-4">
                    <input type="checkbox" ${d.r1 ? 'checked' : ''} onchange="toggleF('${sub}-${chap}')" class="w-6 h-6 rounded border-slate-700 bg-black/10">
                    <div class="flex-grow" onclick="startBattle('${sub}', '${chap}')">
                        <h4 class="text-xs font-bold leading-tight">${chap}</h4>
                        <p class="text-[9px] font-black text-blue-500 mt-1">${(d.time/3600).toFixed(2)} HOURS</p>
                    </div>
                    <button onclick="startBattle('${sub}', '${chap}')" class="p-2 text-blue-500"><i data-lucide="play" class="w-4 h-4"></i></button>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function toggleF(k) { 
            if(!studyData[k]) studyData[k]={r1:false,time:0}; 
            studyData[k].r1 = !studyData[k].r1; 
            save(); renderMenu(); 
        }

        function showSubjects() { 
            document.getElementById('chapter-list-view').classList.add('hidden'); 
            document.getElementById('subject-grid-view').classList.remove('hidden'); 
            renderMenu(); 
        }

        function save() { localStorage.setItem('caWarRoomDataV16', JSON.stringify(studyData)); }
        
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-icon').setAttribute('data-lucide', isLight ? 'sun' : 'moon');
            lucide.createIcons();
        }

        setInterval(() => {
            const diff = examDate - Date.now();
            const d=Math.floor(diff/86400000), h=Math.floor((diff%86400000)/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
            document.getElementById("countdown").innerHTML = `${d}D : ${h}H : ${m}M : ${s}S TO MAY '26`;
        }, 1000);

        renderMenu();
    </script>
</body>
</html>
